name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "NovelA4Printer" novel_printer.py
          Copy-Item dist\NovelA4Printer.exe "dist\NovelA4Printer-${{ github.ref_name }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovelA4Printer-${{ github.ref_name }}
          path: dist/NovelA4Printer-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NovelA4Printer-${{ github.ref_name }}.exe
          name: 小说 A4 自动排版打印工具 ${{ github.ref_name }}
          body: |
            第一版发布。

            功能：
            - TXT 小说自动排版成 A4 横向两栏 PDF
            - 默认黄金设置
            - 支持省纸模式、舒适阅读模式
            - 自动清理多余空行
            - 章节标题自动居中
            - 可打开 PDF 或调起打印
