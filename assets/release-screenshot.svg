<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#eaf3ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#245fbd"/>
      <stop offset="1" stop-color="#3ca3e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#16345c" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="640" y="74" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="34" font-weight="700" fill="#1f3556">小说 A4 自动排版打印工具</text>
  <text x="640" y="112" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" fill="#65758d">TXT 小说 → A4 小册子 / 两栏 PDF，一键排版打印</text>

  <g filter="url(#shadow)">
    <rect x="150" y="150" width="980" height="540" rx="28" fill="#ffffff"/>
    <rect x="150" y="150" width="980" height="122" rx="28" fill="url(#hero)"/>
    <rect x="150" y="230" width="980" height="42" fill="url(#hero)"/>
    <text x="200" y="208" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="32" font-weight="700" fill="#ffffff">小说 A4 自动排版打印工具</text>
    <text x="200" y="244" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" fill="#dcecff">把 TXT 小说自动排成适合 A4 双面打印的小册子 PDF，也支持 A4 横向两栏直接打印。</text>
    <text x="200" y="330" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1f3556">1. 选择小说与编码</text>
    <rect x="200" y="350" width="690" height="44" rx="10" fill="#f3f7fc" stroke="#d8e3f0"/>
    <text x="224" y="378" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#7a8797">选择 TXT 小说文件...</text>
    <rect x="910" y="350" width="130" height="44" rx="10" fill="#2f75d6"/>
    <text x="975" y="379" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" font-weight="700" fill="#ffffff">选择 TXT</text>

    <rect x="200" y="430" width="420" height="145" rx="18" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="230" y="466" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1f3556">2. 打印方式</text>
    <circle cx="238" cy="505" r="8" fill="#2f75d6"/><text x="260" y="511" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#26364d">小册子打印</text>
    <circle cx="238" cy="545" r="8" fill="#b8c6d8"/><text x="260" y="551" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#26364d">A4 两栏直接打印</text>

    <rect x="650" y="430" width="390" height="145" rx="18" fill="#ffffff" stroke="#d8e3f0"/>
    <text x="680" y="466" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#1f3556">3. 排版模式</text>
    <circle cx="688" cy="505" r="8" fill="#2f75d6"/><text x="710" y="511" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#26364d">黄金设置</text>
    <circle cx="688" cy="545" r="8" fill="#b8c6d8"/><text x="710" y="551" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="15" fill="#26364d">省纸模式 / 舒适阅读</text>

    <rect x="200" y="610" width="160" height="46" rx="12" fill="#2f75d6"/>
    <text x="280" y="640" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="17" font-weight="700" fill="#ffffff">生成 PDF</text>
    <rect x="380" y="610" width="120" height="46" rx="12" fill="#eef4fb" stroke="#d8e3f0"/>
    <text x="440" y="640" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="16" fill="#26364d">打开 PDF</text>
  </g>
</svg>
